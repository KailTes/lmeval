include: _default_template_yaml
task: longbench_lcc_aligned
dataset_name: lcc
doc_to_text: "Please complete the code given below. \n{{context}}Next line of code:"
doc_to_target: "{{answers}}"
process_results: !function utils.aligned_code_sim
generation_kwargs:
  max_gen_toks: 1024
  until:
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
    - "<|endoftext|>"
    - "<|return|>"
metric_list:
  - metric: score
    aggregation: mean
    higher_is_better: true
  - metric: code_sim_score
    aggregation: mean
    higher_is_better: true
