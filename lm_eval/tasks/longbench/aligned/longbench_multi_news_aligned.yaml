include: _default_template_yaml
task: longbench_multi_news_aligned
dataset_name: multi_news
doc_to_text: "You are given several news passages. Write a one-page summary of all news.\n\n{{context}}\n\nNow, write a one-page summary of all the news.\n\nSummary:"
doc_to_target: "{{answers}}"
process_results: !function utils.aligned_rouge
generation_kwargs:
  max_gen_toks: 4096
  until:
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
    - "<|endoftext|>"
    - "<|return|>"
metric_list:
  - metric: score
    aggregation: mean
    higher_is_better: true
  - metric: rouge_score
    aggregation: mean
    higher_is_better: true
