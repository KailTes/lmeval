include: _default_template_yaml
task: longbench_dureader_aligned
dataset_name: dureader
doc_to_text: "请基于给定的文章回答下述问题。\n\n文章：{{context}}\n\n请基于上述文章回答下面的问题。\n\n问题：{{question}}\n回答："
doc_to_target: "{{answers}}"
process_results: !function utils.aligned_rouge_zh
generation_kwargs:
  max_gen_toks: 2048
  until:
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
    - "<|endoftext|>"
    - "<|return|>"
metric_list:
  - metric: score
    aggregation: mean
    higher_is_better: true
  - metric: rouge_zh_score
    aggregation: mean
    higher_is_better: true
