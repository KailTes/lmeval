include: _default_template_yaml
task: longbench_gov_report_aligned
dataset_name: gov_report
doc_to_text: "You are given a report by a government agency. Write a one-page summary of the report.\n\nReport:\n{{context}}\n\nNow, write a one-page summary of the report.\n\nSummary:"
doc_to_target: "{{answers}}"
process_results: !function utils.aligned_rouge
generation_kwargs:
  max_gen_toks: 4096
  until:
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
    - "<|endoftext|>"
    - "<|return|>"
metric_list:
  - metric: score
    aggregation: mean
    higher_is_better: true
  - metric: rouge_score
    aggregation: mean
    higher_is_better: true
