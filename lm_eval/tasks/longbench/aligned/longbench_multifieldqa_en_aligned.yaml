include: _default_template_yaml
task: longbench_multifieldqa_en_aligned
dataset_name: multifieldqa_en
doc_to_text: "Read the following text and answer briefly.\n\n{{context}}\n\nNow, answer the following question based on the above text, only give me the answer and do not output any other words.\n\nQuestion: {{question}}\nAnswer:"
doc_to_target: "{{answers}}"
process_results: !function utils.aligned_qa_f1
generation_kwargs:
  max_gen_toks: 2048
  until:
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
    - "<|endoftext|>"
    - "<|return|>"
metric_list:
  - metric: score
    aggregation: mean
    higher_is_better: true
  - metric: qa_f1_score
    aggregation: mean
    higher_is_better: true
