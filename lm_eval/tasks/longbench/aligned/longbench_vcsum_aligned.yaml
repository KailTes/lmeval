include: _default_template_yaml
task: longbench_vcsum_aligned
dataset_name: vcsum
doc_to_text: "下面有一段会议记录，请你阅读后，写一段总结，总结会议的内容。\n会议记录：\n{{context}}\n\n会议总结："
doc_to_target: "{{answers}}"
process_results: !function utils.aligned_rouge_zh
generation_kwargs:
  max_gen_toks: 4096
  until:
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
    - "<|endoftext|>"
    - "<|return|>"
metric_list:
  - metric: score
    aggregation: mean
    higher_is_better: true
  - metric: rouge_zh_score
    aggregation: mean
    higher_is_better: true
