include: _default_template_yaml
task: longbench_trec_aligned
dataset_name: trec
doc_to_text: "Please determine the type of the question below. Here are some examples of questions.\n\n{{context}}\n{{question}}"
doc_to_target: "{{answers}}"
target_delimiter: ""
process_results: !function utils.aligned_classification
generation_kwargs:
  max_gen_toks: 1024
  until:
    - "\n"
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
    - "<|endoftext|>"
    - "<|return|>"
metric_list:
  - metric: score
    aggregation: mean
    higher_is_better: true
  - metric: classification_score
    aggregation: mean
    higher_is_better: true
