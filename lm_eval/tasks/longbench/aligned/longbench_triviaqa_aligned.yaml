include: _default_template_yaml
task: longbench_triviaqa_aligned
dataset_name: triviaqa
doc_to_text: "Answer the question based on the given passage. Only give me the answer and do not output any other words. The following are some examples.\n\n{{context}}\n\n{{question}}"
doc_to_target: "{{answers}}"
target_delimiter: ""
process_results: !function utils.aligned_qa_f1
generation_kwargs:
  max_gen_toks: 2048
  until:
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
    - "<|endoftext|>"
    - "<|return|>"
metric_list:
  - metric: score
    aggregation: mean
    higher_is_better: true
  - metric: qa_f1_score
    aggregation: mean
    higher_is_better: true
