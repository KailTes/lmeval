include: _default_template_yaml
task: longbench_lsht_aligned
dataset_name: lsht
doc_to_text: "请判断给定新闻的类别，下面是一些例子。\n\n{{context}}\n{{question}}"
doc_to_target: "{{answers}}"
process_results: !function utils.aligned_classification
generation_kwargs:
  max_gen_toks: 1024
  until:
    - "\n"
    - "</s>"
    - "<|im_end|>"
    - "<|eot_id|>"
    - "<|endoftext|>"
    - "<|return|>"
metric_list:
  - metric: score
    aggregation: mean
    higher_is_better: true
  - metric: classification_score
    aggregation: mean
    higher_is_better: true
